<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">

  <title>Calculadora Pro</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">

  <h1>Calculadora <span>Pro</span> 🧠</h1>

  <!-- 🔢 ENTRADAS -->
  <div class="inputs">

    <div>
      <label>Número 1</label>
      <input type="number" id="num1">
    </div>

    <div>
      <label>Número 2</label>
      <input type="number" id="num2">
    </div>

    <div>
      <label>Operación</label>
      <select id="operacion">
        <option value="sumar">➕ Suma</option>
        <option value="restar">➖ Resta</option>
        <option value="multiplicar">✖ Multiplicación</option>
        <option value="dividir">➗ División</option>
      </select>
    </div>

    <button onclick="calcular()">Calcular</button>
    <button onclick="limpiar()">Limpiar</button>

  </div>

  <!-- 📊 RESULTADOS -->
  <div class="resultados">

    <div class="box resultado">
      <h2>Resultado</h2>
      <p id="resultado">0</p>
      <button onclick="copiar()">Copiar</button>
    </div>

    <div class="box procedimiento">
      <h2>Procedimiento</h2>
      <pre id="pasos"></pre>
    </div>

  </div>

  <!-- 📜 HISTORIAL -->
  <div class="box historial">
    <h2>Historial</h2>
    <ul id="historial"></ul>
  </div>

</div>

<footer>
  <div class="footer-box">
    💻 Hecha por <span class="nombre">Stiven Prado</span> 💖
    <p>App matemática avanzada 🚀</p>
  </div>
</footer>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
